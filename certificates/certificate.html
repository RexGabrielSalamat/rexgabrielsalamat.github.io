<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGMS - Technical Archive</title>
    <link rel="icon" type="image/png" href="../petercarter.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-200 font-sans overflow-x-hidden">

    <div id="certModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 md:p-10">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-xl" onclick="closeModal()"></div>
        
        <div class="relative bg-[#0a0a0a] border border-white/10 rounded-3xl p-6 md:p-8 max-w-4xl w-full shadow-2xl transform transition-all scale-95 opacity-0" id="modalContent">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-gray-500 hover:text-white text-3xl font-light">&times;</button>
            
            <div class="flex flex-col gap-6">
                <img id="modalImg" src="" alt="Full Certificate" class="w-full rounded-xl border border-white/5 shadow-2xl max-h-[70vh] object-contain bg-black">
                
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h3 id="modalTitle" class="text-2xl font-black text-white uppercase tracking-tighter leading-tight"></h3>
                        <p id="modalOrg" class="text-gray-500 text-xs uppercase tracking-widest mt-1"></p>
                    </div>
                    <div id="modalTags" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed top-0 left-0 w-full z-50 border-b border-white/5 bg-black/60 backdrop-blur-xl">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="../petercarter.png" alt="Logo" class="w-8 h-8 rounded-md object-cover">
                <h1 class="text-xl font-bold tracking-tighter text-white uppercase">Technical Archive</h1>
            </div>
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html" class="text-sm font-medium text-gray-400 hover:text-red-500 transition-colors uppercase tracking-widest">Home</a>
                <a href="index.html#projects" class="text-sm font-medium text-gray-400 hover:text-red-500 transition-colors uppercase tracking-widest">Projects</a>
                <a href="index.html#contact" class="px-5 py-2 bg-red-600/10 border border-red-600/20 text-red-500 rounded-full text-xs font-bold hover:bg-red-600 hover:text-white transition-all uppercase tracking-widest">Contact</a>
            </div>
        </div>
    </nav>

    <div class="fixed inset-0 -z-10">
        <div class="absolute inset-0 opacity-[0.05]" style="background-image: linear-gradient(#ffffff 1px, transparent 1px), linear-gradient(90deg, #ffffff 1px, transparent 1px); background-size: 40px 40px;"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-[800px] h-[800px] bg-red-900/10 blur-[150px] rounded-full"></div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto py-32 px-6">
        <div class="mb-20">
            <h1 class="text-6xl md:text-8xl font-black text-white uppercase tracking-tighter leading-none mb-4">The <span class="text-red-600">Registry</span></h1>
            <p class="text-gray-500 text-sm uppercase tracking-[0.3em]">Full verification of 14 professional qualifications.</p>
        </div>

        <section class="mb-32">
            <div class="flex items-center gap-4 mb-12">
                <div class="h-10 w-1 bg-red-600 shadow-[0_0_20px_rgba(220,38,38,0.6)]"></div>
                <h2 class="text-3xl font-black text-white uppercase tracking-widest">Professional Training</h2>
            </div>
            <div id="trainingGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>

        <section class="mb-32">
            <div class="flex items-center gap-4 mb-12">
                <div class="h-10 w-1 bg-red-600 shadow-[0_0_20px_rgba(220,38,38,0.6)]"></div>
                <h2 class="text-3xl font-black text-white uppercase tracking-widest">Events & Participation</h2>
            </div>
            <div id="eventGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <footer class="border-t border-white/5 py-12 text-center">
        <p class="text-gray-600 text-[10px] uppercase tracking-[0.4em]">&copy; 2026 Registry Management System</p>
    </footer>

    <script>
        const trainingCerts = [
            { file: 'Certificate of Completion - Computer System Servicing.jpg', title: 'Computer System Servicing', org: 'Power Technical Training Center', tags: ['Hardware', 'Networking', 'Computer Logic'] },
            { file: 'Certificate of Completion - Launchpad Ramp.jpg', title: 'Launchpad Ramp', org: 'Endless Studios', tags: ['Team Collaboration', 'Creativity', 'Game Development'] },
            { file: 'Data Fundamentals - IBM Skillsbuild.jpg', title: 'Data Fundamentals', org: 'IBM Skillsbuild', tags: ['Data Science', 'IBM'] },
            { file: 'Certificate of Completion - Learning Java 11.jpg', title: 'Learning Java 11', org: 'LinkedIn Learning', tags: ['Java', 'OOP'] },
            { file: 'Certificate of Completion - Python Essential Training.jpg', title: 'Python Essential Training', org: 'LinkedIn Learning', tags: ['Python', 'Automation'] },
            { file: 'Certificate of Completion - Python for Students.jpg', title: 'Python for Students', org: 'LinkedIn Learning', tags: ['Python', 'Basics'] },
            { file: 'Certificate of Completion - Complete Guide to C Programming Foundations.jpg', title: 'C Programming Foundations', org: 'LinkedIn Learning', tags: ['C', 'Low-Level'] },
            { file: 'Certificate of Completion - IoT Foundations - Fundamentals.jpg', title: 'IoT Foundations', org: 'LinkedIn Learning', tags: ['IoT', 'Hardware'] },
            { file: 'Certificate of Completion - Programming Foundations - Inside Computing Hardware.jpg', title: 'Inside Computing Hardware', org: 'LinkedIn Learning', tags: ['Hardware', 'Architecture'] },
            { file: 'Certificate of Completion - Software Design - Developing Effective Requirements.jpg', title: 'Software Design Requirements', org: 'LinkedIn Learning', tags: ['SDLC', 'Design'] }
        ];

        const eventCerts = [
            { file: 'Certificate of Participation - NASA Space Apps Challenge Abu Dhabi.jpg', title: 'NASA Space Apps Challenge', org: 'Abu Dhabi Hackathon', tags: ['Data Analysis', 'Python', 'HTML'] },
            { file: 'Certificate of Participation - AURAK Engineering Explorers Spring Camp.jpg', title: 'Engineering Explorers', org: 'AURAK Spring Camp', tags: ['Engineering', 'Robotics'] },
            { file: 'Certificate of Attendance - Python Programming with Red Hat.jpg', title: 'Python with Red Hat', org: 'Red Hat Academy', tags: ['Enterprise', 'Python'] },
            { file: 'Certificate of Attendance - UOWD Summer Camp.jpg', title: 'Innovation Summer Camp', org: 'UOWD Dubai', tags: ['Leadership', 'Innovation'] }
        ];

        function renderCerts(data, gridId) {
            const grid = document.getElementById(gridId);
            data.forEach(c => {
                const card = document.createElement('div');
                card.className = "group bg-white/5 border border-white/10 rounded-2xl hover:border-red-600 transition-all duration-500 cursor-pointer overflow-hidden backdrop-blur-sm flex flex-col";
                card.onclick = () => openModal(c.file, c.title, c.org, c.tags);
                
                // Create tags HTML
                const tagsHTML = c.tags.map(tag => 
                    `<span class="px-2 py-0.5 bg-red-600/10 border border-red-600/20 text-red-500 text-[7px] font-bold rounded uppercase tracking-tighter">${tag}</span>`
                ).join('');

                card.innerHTML = `
                    <div class="aspect-video overflow-hidden border-b border-white/5">
                        <img src="${c.file}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" onerror="this.src='https://via.placeholder.com/400x225/111/444?text=Image+Not+Found'">
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <h3 class="text-white font-bold uppercase text-[10px] tracking-tighter mb-1 leading-tight">${c.title}</h3>
                        <p class="text-gray-500 text-[8px] uppercase tracking-widest mb-4">${c.org}</p>
                        <div class="mt-auto flex flex-wrap gap-1.5">
                            ${tagsHTML}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        renderCerts(trainingCerts, 'trainingGrid');
        renderCerts(eventCerts, 'eventGrid');

        const modal = document.getElementById('certModal');
        const modalContent = document.getElementById('modalContent');
        const modalImg = document.getElementById('modalImg');
        const modalTitle = document.getElementById('modalTitle');
        const modalOrg = document.getElementById('modalOrg');
        const modalTags = document.getElementById('modalTags');

        function openModal(imgSrc, title, org, tags) {
            modalImg.src = imgSrc;
            modalTitle.innerText = title;
            modalOrg.innerText = org;
            modalTags.innerHTML = '';
            
            tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = "px-3 py-1 bg-red-600/10 border border-red-600/20 text-red-500 text-[9px] font-bold rounded-full uppercase tracking-tighter";
                span.innerText = tag;
                modalTags.appendChild(span);
            });

            modal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
