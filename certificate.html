<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGMS - Certificates</title>
    <link rel="icon" type="image/png" href="../petercarter.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-gray-200 font-sans overflow-x-hidden">

    <nav class="fixed top-0 left-0 w-full z-50 border-b border-white/5 bg-black/60 backdrop-blur-xl">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="../petercarter.png" alt="Logo" class="w-8 h-8 rounded-md object-cover">
                <h1 class="text-xl font-bold tracking-tighter text-white">RG's Certificates</h1>
            </div>
            <div class="hidden md:flex items-center space-x-8">
                <a href="../index.html" class="text-sm font-medium text-gray-400 hover:text-red-500 transition-colors uppercase tracking-widest">Home</a>
                <a href="../index.html#about" class="text-sm font-medium text-gray-400 hover:text-red-500 transition-colors uppercase tracking-widest">About</a>
                <a href="../index.html#projects" class="text-sm font-medium text-gray-400 hover:text-red-500 transition-colors uppercase tracking-widest">Projects</a>
                <a href="../index.html#contact" class="px-5 py-2 bg-red-600/10 border border-red-600/20 text-red-500 rounded-full text-xs font-bold hover:bg-red-600 hover:text-white transition-all uppercase tracking-widest">Contact</a>
            </div>
        </div>
    </nav>

    <div class="fixed inset-0 -z-10">
        <div class="absolute inset-0 opacity-[0.05]" style="background-image: linear-gradient(#ffffff 1px, transparent 1px), linear-gradient(90deg, #ffffff 1px, transparent 1px); background-size: 40px 40px;"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-[800px] h-[800px] bg-red-900/10 blur-[150px] rounded-full"></div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto py-32 px-6">
        <div class="mb-20">
            <h1 class="text-6xl md:text-8xl font-black text-white uppercase tracking-tighter leading-none mb-4">Certificates <span class="text-red-600">Archive</span></h1>
            <p class="text-gray-500 text-sm uppercase tracking-[0.3em]">Continuous learning, continuous growth.</p>
        </div>

        <section class="mb-32">
            <div class="flex items-center gap-4 mb-12">
                <div class="h-10 w-1 bg-red-600 shadow-[0_0_20px_rgba(220,38,38,0.6)]"></div>
                <h2 class="text-3xl font-black text-white uppercase tracking-widest">Professional Training</h2>
            </div>
            <div id="trainingGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>

        <section class="mb-32">
            <div class="flex items-center gap-4 mb-12">
                <div class="h-10 w-1 bg-red-600 shadow-[0_0_20px_rgba(220,38,38,0.6)]"></div>
                <h2 class="text-3xl font-black text-white uppercase tracking-widest">Events & Participation</h2>
            </div>
            <div id="eventGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <footer class="relative w-full border-t border-white/5 bg-black py-12 overflow-hidden">
        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-red-900/5 blur-[100px] -z-10"></div>

        <div class="max-w-6xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                
                <div class="text-center md:text-left">
                    <div class="flex items-center justify-center md:justify-start gap-2 mb-2">
                        <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
                        <span class="text-white font-bold tracking-tighter uppercase">RG's Portfolio</span>
                    </div>
                    <p class="text-gray-500 text-xs tracking-widest uppercase">
                        Certificates Page
                    </p>
                </div>

                <div class="flex gap-8 text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">
                    <a href="index.html#home" class="hover:text-red-600 transition-colors">Home</a>
                    <a href="index.html#about" class="hover:text-red-600 transition-colors">About</a>
                    <a href="index.html#projects" class="hover:text-red-600 transition-colors">Projects</a>
                    <a href="index.html#experience" class="hover:text-red-600 transition-colors">Experience</a>
                    <a href="index.html#contact" class="hover:text-red-600 transition-colors">Contact</a>
                </div>

                <div class="text-center md:text-right">
                    <p class="text-gray-500 text-[10px] uppercase tracking-widest">
                        &copy; 2026 All Rights Reserved.
                    </p>
                    <p class="text-gray-400 text-[10px] font-mono mt-1">
                        Built with Passion & Purpose.
                    </p>
                </div>
            </div>

            <div class="mt-12 flex justify-center">
                <a href="#" class="p-3 bg-white/5 border border-white/10 rounded-full hover:border-red-600 transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 group-hover:text-red-600 group-hover:-translate-y-1 transition-all"><path d="m18 15-6-6-6 6"/></svg>
                </a>
            </div>
        </div>
    </footer>

    <div id="certModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 md:p-10">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-xl" onclick="closeModal()"></div>
        
        <div class="relative bg-[#0a0a0a] border border-white/10 rounded-3xl p-6 md:p-8 max-w-4xl w-full shadow-2xl transform transition-all scale-95 opacity-0" id="modalContent">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-gray-500 hover:text-white text-3xl font-light">&times;</button>
            
            <div class="flex flex-col gap-6">
                <img id="modalImg" src="" alt="Full Certificate" class="w-full rounded-xl border border-white/5 shadow-2xl max-h-[70vh] object-contain bg-black">
                
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h3 id="modalTitle" class="text-2xl font-black text-white uppercase tracking-tighter leading-tight"></h3>
                        <p id="modalOrg" class="text-gray-500 text-xs uppercase tracking-widest mt-1"></p>
                    </div>
                    <div id="modalTags" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="cert-script.js"></script>
</body>
</html>
